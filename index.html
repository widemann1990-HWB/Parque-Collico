<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Parque Collico</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/@tmcw/togeojson"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
overflow:hidden;
background:#111;
color:white;
}

.pantalla{display:none;}
.activa{display:block;}

/* =====================
PORTADA
===================== */

#inicio{
position:relative;
height:100vh;
}

#inicio img{
width:100%;
height:100%;
object-fit:cover;
}

.overlay{
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,.45);
}

.logo{
position:absolute;
top:60px;
left:50%;
transform:translateX(-50%);
text-align:center;
width:100%;
}

.logo h1{font-size:52px;}
.logo h2{font-size:28px;}
.logo h3{font-size:18px;}

.subtitulo{
position:absolute;
bottom:120px;
width:100%;
text-align:center;
}

.boton{
position:absolute;
bottom:50px;
left:50%;
transform:translateX(-50%);
padding:16px 35px;
border:none;
border-radius:40px;
background:#2c7a7b;
color:white;
font-size:18px;
}

/* =====================
REGISTRO
===================== */

#registro{
height:100vh;
overflow:auto;
position:relative;
}

.registro-fondo{
position:absolute;
width:100%;
height:100%;
background:url('img/foto1.jpg') center/cover;
}

.registro-overlay{
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,.65);
}

.registro-contenido{
position:relative;
z-index:2;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
flex-direction:column;
padding:20px;
}

.form-card{
background:white;
color:black;
padding:25px;
border-radius:20px;
width:100%;
max-width:450px;
}

input,select{
width:100%;
padding:12px;
margin-bottom:10px;
border-radius:8px;
border:1px solid #ccc;
}

.btn-entrar{
width:100%;
padding:14px;
background:#2c7a7b;
color:white;
border:none;
border-radius:10px;
}

/* =====================
MAPA
===================== */

#mapa{height:100vh;}
#map{height:100vh;width:100%;}

#sidebar{
position:absolute;
top:0;
left:0;
width:320px;
height:100%;
background:#111;
z-index:1000;
padding:15px;
overflow:auto;
}

.card,.ruta-item{
background:#222;
padding:15px;
border-radius:12px;
margin-bottom:10px;
}

.ruta-item{cursor:pointer;}

/* =====================
RESPONSIVE
===================== */

@media (max-width:768px){

#sidebar{
width:100%;
height:40%;
top:auto;
bottom:0;
border-radius:20px 20px 0 0;
}

.logo h1{font-size:32px;}
.logo h2{font-size:18px;}
.logo h3{font-size:14px;}

}

/* BOTON MENU */

.btn-menu{
width:100%;
margin-bottom:10px;
padding:10px;
border:none;
background:#2c7a7b;
color:white;
border-radius:10px;
}

</style>
</head>

<body>

<!-- INICIO -->
<div id="inicio" class="pantalla activa">
<img src="img/foto1.jpg">
<div class="overlay"></div>

<div class="logo">
<h1>Parque Collico</h1>
<h2>Bosque Abierto</h2>
<h3>ARAUCO</h3>
</div>

<div class="subtitulo">
Trail Running · MTB · Trekking
</div>

<button class="boton" onclick="mostrar('registro')">
INGRESAR
</button>
</div>

<!-- REGISTRO -->
<div id="registro" class="pantalla">
<div class="registro-fondo"></div>
<div class="registro-overlay"></div>

<div class="registro-contenido">

<div class="form-card">
<input id="nombre" placeholder="Nombre">
<input id="rut" placeholder="RUT">
<input id="telefono" placeholder="Teléfono">
<select id="genero">
<option value="">Sexo</option>
<option>Hombre</option>
<option>Mujer</option>
</select>
<input id="correo" placeholder="Correo">

<label>
<input type="checkbox" id="acepta"> Acepto términos
</label>

<button class="btn-entrar" onclick="entrarMapa()">
ENTRAR
</button>

</div>
</div>
</div>

<!-- MAPA -->
<div id="mapa" class="pantalla">

<div id="sidebar">

<button class="btn-menu" onclick="toggleMenu()">
OCULTAR / MOSTRAR
</button>

<div class="card">
<h2>PARQUE COLLICO</h2>
<p>23 Senderos</p>
<p>38,25 km</p>
<p>Visitas: <span id="contador-personas">0</span></p>
</div>

<div id="lista-rutas"></div>

</div>

<div id="map"></div>

</div>

<script>

/* PANTALLAS */
function mostrar(id){
document.querySelectorAll('.pantalla').forEach(p=>p.classList.remove('activa'));
document.getElementById(id).classList.add('activa');
}

/* VOZ */
function hablar(texto){
const voz=new SpeechSynthesisUtterance(texto);
voz.lang="es-CL";
speechSynthesis.speak(voz);
}

/* ENTRAR */
function entrarMapa(){

if(!nombre.value || !rut.value || !telefono.value || !genero.value || !correo.value){
alert("Completa todo");
return;
}

if(!acepta.checked){
alert("Acepta términos");
return;
}

mostrar("mapa");

setTimeout(()=>{
iniciarMapa();
hablar("Bienvenido a Parque Collico");
},500);

}

/* MENU */
function toggleMenu(){
const s=document.getElementById("sidebar");
s.style.height = (s.style.height==="0%") ? "40%" : "0%";
}

/* MAPA */
function iniciarMapa(){

if(window.mapaCreado)return;
window.mapaCreado=true;

let visitas=localStorage.getItem("visitasParque")||0;
visitas++;
localStorage.setItem("visitasParque",visitas);
contador-personas.innerText=visitas;

const map=L.map('map').setView([-39.82,-73.18],14);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

fetch('rutas.kml')
.then(r=>r.text())
.then(kmlText=>{

const geojson=toGeoJSON.kml(new DOMParser().parseFromString(kmlText,'text/xml'));

const rutas=L.geoJSON(geojson,{
style:()=>({color:"#00e5ff",weight:5}),
onEachFeature:(f,l)=>{

const nombre=(f.properties.name||"Ruta").toUpperCase();

l.bindPopup(<b>${nombre}</b>);

const item=document.createElement("div");
item.className="ruta-item";
item.innerHTML=nombre;

item.onclick=()=>{
map.fitBounds(l.getBounds());
l.openPopup();
};

lista-rutas.appendChild(item);

}
}).addTo(map);

map.fitBounds(rutas.getBounds());

setTimeout(()=>map.invalidateSize(),500);

});

map.locate({watch:true});

map.on('locationfound',e=>{
L.marker(e.latlng).addTo(map);
});

}

</script>

</body>
</html>
