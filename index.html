<!DOCTYPE html>
<html lang="es">
  <div id="formulario" style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
z-index:2000;
">

  <div style="
  background:white;
  margin:50px auto;
  padding:20px;
  width:90%;
  max-width:400px;
  border-radius:15px;
  ">

    <h3>Registro de ingreso</h3>

    <input placeholder="Nombre" id="nombre" style="width:100%; margin:5px 0;"><br>
    <input placeholder="RUT" id="rut" style="width:100%; margin:5px 0;"><br>
    <input placeholder="Teléfono" id="telefono" style="width:100%; margin:5px 0;"><br>
    <input placeholder="Correo" id="correo" style="width:100%; margin:5px 0;"><br>

    <label>
      <input type="checkbox" id="condiciones">
      Acepto condiciones de uso
    </label>

    <br><br>

    <button onclick="enviarDatos()">Aceptar</button>
    <button onclick="cerrarFormulario()">Cerrar</button>

  </div>
</div>
<head>
  <meta charset="UTF-8">
  <title>Parque Collico</title>
</head>
<body style="font-family: Arial; text-align: center;">
  <button onclick="abrirFormulario()" style="
position: fixed;
top: 20px;
right: 20px;
z-index: 1000;
padding: 10px 15px;
background: #2c7a7b;
color: white;
border: none;
border-radius: 10px;
">
Ingresar
</button>

  <h1>🌲 Parque Collico</h1>
  <p>Bienvenido a las rutas del parque</p>

  <img src="img/foto1.jpg" style="width:100%; border-radius:15px;">

</body>
</html>
