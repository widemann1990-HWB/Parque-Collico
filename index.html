<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Parque Collico</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-omnivore/leaflet-omnivore.min.js"></script>

<style>
body { margin: 0; font-family: Arial; }

/* PANTALLAS */
.pantalla {
  display: none;
}

.activa {
  display: block;
}

/* PORTADA */
.portada img {
  width: 100%;
  height: 100vh;
  object-fit: cover;
}

.boton {
  position: absolute;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  padding: 15px 25px;
  background: #2c7a7b;
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 18px;
}

/* FORMULARIO */
.form-box {
  padding: 20px;
}

input {
  width: 100%;
  margin: 8px 0;
  padding: 10px;
}

/* MAPA */
#map {
  height: 100vh;
}
</style>
</head>

<body>

<!-- 🌲 PANTALLA 1 -->
<div id="inicio" class="pantalla activa portada">
  <img src="img/foto1.jpg">
  <button class="boton" onclick="irFormulario()">Ingresar</button>
</div>

<!-- 📋 PANTALLA 2 -->
<div id="formulario" class="pantalla">
  <div class="form-box">
    <h2>Registro de ingreso</h2>

    <input placeholder="Nombre" id="nombre">
    <input placeholder="RUT" id="rut">
    <input placeholder="Teléfono" id="telefono">
    <input placeholder="Correo" id="correo">

    <label>
      <input type="checkbox" id="condiciones">
      Acepto términos y condiciones
    </label>

    <br><br>

    <button onclick="validarIngreso()">Entrar</button>
  </div>
</div>

<!-- 🗺️ PANTALLA 3 -->
<div id="mapa" class="pantalla">
  <div id="map"></div>
</div>

<script>

// cambiar pantallas
function mostrar(id) {
  document.querySelectorAll('.pantalla').forEach(p => p.classList.remove('activa'));
  document.getElementById(id).classList.add('activa');
}

function irFormulario() {
  mostrar("formulario");
}

// validar
function validarIngreso() {
  let nombre = document.getElementById("nombre").value;
  let rut = document.getElementById("rut").value;
  let telefono = document.getElementById("telefono").value;
  let correo = document.getElementById("correo").value;
  let acepta = document.getElementById("condiciones").checked;

  if (!nombre || !rut || !telefono || !correo) {
    alert("Completa todos los campos");
    return;
  }

  if (!acepta) {
    alert("Debes aceptar los términos");
    return;
  }

  mostrar("mapa");
  iniciarMapa();
}

// MAPA
function iniciarMapa() {

  const map = L.map('map').setView([-39.8, -73.2], 14);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

  omnivore.kml('rutas.kml')
    .on('ready', function() {
      map.fitBounds(this.getBounds());
    })
    .addTo(map);

  map.locate({ setView: true });

  map.on('locationfound', e => {
    L.marker(e.latlng).addTo(map)
      .bindPopup("Estás aquí")
      .openPopup();
  });
}

</script>

</body>
</html>
