<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Parque Collico</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-omnivore/leaflet-omnivore.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
}

#map {
  height: 60vh;
}

img {
  width: 100%;
  height: 250px;
  object-fit: cover;
}

.boton {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 1000;
  padding: 10px 15px;
  background: #2c7a7b;
  color: white;
  border: none;
  border-radius: 10px;
}

/* FORMULARIO */
#formulario {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  z-index: 2000;
}

.form-box {
  background: white;
  margin: 50px auto;
  padding: 20px;
  width: 90%;
  max-width: 400px;
  border-radius: 15px;
}
</style>
</head>

<body>

<!-- 🔘 BOTÓN -->
<button class="boton" onclick="abrirFormulario()">Ingresar</button>

<!-- 🌲 IMAGEN -->
<img src="img/foto1.jpg">

<!-- 🗺️ MAPA -->
<div id="map"></div>

<!-- 📋 FORMULARIO -->
<div id="formulario">
  <div class="form-box">
    <h3>Registro de ingreso</h3>

    <input placeholder="Nombre" id="nombre" style="width:100%; margin:5px 0;"><br>
    <input placeholder="RUT" id="rut" style="width:100%; margin:5px 0;"><br>
    <input placeholder="Teléfono" id="telefono" style="width:100%; margin:5px 0;"><br>
    <input placeholder="Correo" id="correo" style="width:100%; margin:5px 0;"><br>

    <label>
      <input type="checkbox" id="condiciones">
      Acepto condiciones de uso
    </label>

    <br><br>

    <button onclick="enviarDatos()">Aceptar</button>
    <button onclick="cerrarFormulario()">Cerrar</button>
  </div>
</div>

<script>

// 🗺️ MAPA
const map = L.map('map').setView([-39.8, -73.2], 14);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// rutas (asegúrate que exista rutas.kml)
omnivore.kml('rutas.kml')
  .on('ready', function() {
    map.fitBounds(this.getBounds());
  })
  .addTo(map);

// ubicación
map.locate({ setView: true });

map.on('locationfound', e => {
  L.marker(e.latlng).addTo(map)
    .bindPopup("Estás aquí")
    .openPopup();
});

// 📋 FORMULARIO
function abrirFormulario() {
  document.getElementById("formulario").style.display = "block";
}

function cerrarFormulario() {
  document.getElementById("formulario").style.display = "none";
}

function enviarDatos() {

  let nombre = document.getElementById("nombre").value;
  let rut = document.getElementById("rut").value;
  let telefono = document.getElementById("telefono").value;
  let correo = document.getElementById("correo").value;
  let acepta = document.getElementById("condiciones").checked;

  if (!nombre || !rut || !telefono || !correo) {
    alert("Completa todos los campos");
    return;
  }

  if (!acepta) {
    alert("Debes aceptar las condiciones");
    return;
  }

  alert("Ingreso registrado ✔️");

  cerrarFormulario();
}

</script>

</body>
</html>
